name: Daily New-Cases Digest

on:
  # 12:00 UTC daily = 7 AM CDT (summer) / 6 AM CST (winter)
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger digest endpoint
        env:
          TFT_BASE_URL: ${{ secrets.TFT_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [[ -z "${TFT_BASE_URL:-}" ]]; then
            echo "::error::TFT_BASE_URL secret is not set"
            exit 1
          fi
          if [[ -z "${CRON_SECRET:-}" ]]; then
            echo "::error::CRON_SECRET secret is not set"
            exit 1
          fi

          response_file=$(mktemp)
          http_code=$(curl --silent --show-error \
            --max-time 120 \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${TFT_BASE_URL}/api/cron/new-cases-digest")

          echo "HTTP ${http_code}"
          echo "--- response body ---"
          cat "${response_file}"
          echo

          if [[ "${http_code}" != "200" ]]; then
            echo "::error::digest endpoint returned HTTP ${http_code}"
            exit 1
          fi

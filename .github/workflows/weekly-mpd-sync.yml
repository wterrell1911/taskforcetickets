name: Weekly MPD Sync

on:
  # Monday 12:00 UTC = 7 AM CST / 6 AM CDT (mirrors previous Vercel cron schedule)
  schedule:
    - cron: '0 12 * * 1'
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Override start date (YYYY-MM-DD). Leave blank for default rolling 30-day window.'
        required: false
        type: string
      end_date:
        description: 'Override end date (YYYY-MM-DD). Leave blank for default (now).'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run MPD sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNC_START_DATE: ${{ inputs.start_date }}
          SYNC_END_DATE: ${{ inputs.end_date }}
        run: npx -y tsx scripts/sync-mpd.ts
